<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>BettaMind — Legal</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="description" content="BettaMind legal pages — privacy policy and terms of service." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500&family=Geist:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F8F4EC;
    --ink: #4A3A2A;
    --muted: #8E7C6A;
    --accent: #A57632;
    --hairline: #E6DDCF;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Geist', -apple-system, system-ui, sans-serif;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  main {
    max-width: 640px;
    margin: 0 auto;
    padding: 80px 24px 100px;
  }
  .kicker {
    font-size: 11px;
    letter-spacing: 1.6px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }
  h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 500;
    font-size: 40px;
    letter-spacing: -0.5px;
    margin: 8px 0 0;
  }
  .links {
    margin-top: 32px;
    display: grid;
    gap: 14px;
  }
  a.card {
    display: block;
    padding: 18px 20px;
    background: #fff;
    border: 1px solid var(--hairline);
    border-radius: 16px;
    text-decoration: none;
    color: var(--ink);
    transition: border-color 0.15s ease;
  }
  a.card:hover { border-color: var(--accent); }
  a.card .title {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 20px;
  }
  a.card .sub {
    margin-top: 4px;
    color: var(--muted);
    font-size: 13px;
  }
  footer {
    margin-top: 56px;
    color: var(--muted);
    font-size: 13px;
  }
  footer a { color: var(--accent); }
</style>
</head>
<body>
<main>
  <p class="kicker">BettaMind</p>
  <h1>Legal</h1>
  <div class="links">
    <a class="card" href="privacy.html">
      <div class="title">Privacy Policy</div>
      <div class="sub">What we collect, how we use it, and how to delete it.</div>
    </a>
    <a class="card" href="terms.html">
      <div class="title">Terms of Service</div>
      <div class="sub">The agreement between you and BettaMind.</div>
    </a>
    <a class="card" href="delete-account.html">
      <div class="title">Delete your account</div>
      <div class="sub">How to request deletion of your BettaMind account and data.</div>
    </a>
  </div>
  <footer>
    Questions? <a href="mailto:samuvelpandian@gmail.com">samuvelpandian@gmail.com</a>
  </footer>
</main>
</body>
</html>
